<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quay Video Webcam</title>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@10.0.0/dist/browser/signalr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr-protocol-msgpack@10.0.0/dist/browser/signalr-protocol-msgpack.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
      }
      video {
        border: 2px solid #333;
        border-radius: 10px;
        width: 100%;
        max-width: 640px;
        height: auto;
      }
      button {
        margin: 10px 5px;
        padding: 10px 20px;
        font-size: 16px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      p {
        margin: 5px 0;
        font-size: 14px;
      }
      .section {
        margin: 20px 0;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      .section-title {
        font-weight: bold;
        font-size: 16px;
        margin-bottom: 10px;
      }
      input {
        padding: 8px;
        margin: 5px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
        width: 300px;
        max-width: 100%;
      }
      canvas {
        display: none;
      }
      #photoPreview {
        display: none;
        border: 2px solid #333;
        border-radius: 10px;
        width: 100%;
        max-width: 640px;
        height: auto;
        margin-top: 10px;
      }
      .upload-stats {
        display: flex;
        gap: 20px;
        margin-top: 10px;
        padding: 10px;
        background: #f0f0f0;
        border-radius: 4px;
      }
      .stat {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .stat-label {
        font-size: 12px;
        color: #666;
        font-weight: bold;
      }
      .stat-value {
        font-size: 14px;
        color: #333;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>🎥 Ứng dụng Quay Video từ Webcam</h1>

    <div class="section">
      <div class="section-title">📹 Camera</div>
      <video id="preview" autoplay muted></video><br />
      <button id="startCamera">▶️ Bật Camera</button>
      <button id="stopCamera" disabled>⏹️ Tắt Camera</button>
    </div>

    <div class="section">
      <div class="section-title">📷 Chụp Ảnh</div>
      <button id="takePhoto" disabled>📷 Chụp Ảnh</button>
      <button id="savePhoto" disabled>💾 Lưu Ảnh</button>
      <canvas id="photoCanvas"></canvas>
      <img id="photoPreview" alt="Ảnh chụp" />
    </div>

    <div class="section">
      <div class="section-title">🎬 Quay Video</div>
      <label>Tên Luồng:</label><br />
      <input
        id="streamTitle"
        type="text"
        placeholder="Nhập tên cho luồng video"
        value="My Recording"
      />

      <br />
      <button id="startRecording" disabled>⏸️ Bắt Đầu Quay</button>
      <button id="stopRecording" disabled>⏹️ Dừng Quay</button>

      <p id="startTimeDisplay" style="font-size: 18px; font-weight: bold"></p>
      <p id="recordingTimer" style="font-size: 18px; color: red"></p>
      <p id="statusMessage" style="font-size: 14px; color: blue"></p>
      
      <div class="upload-stats" id="uploadStats" style="display: none;">
        <div class="stat">
          <span class="stat-label">📤 Uploaded</span>
          <span class="stat-value" id="uploadedBytes">0 B</span>
        </div>
        <div class="stat">
          <span class="stat-label">📦 Chunks</span>
          <span class="stat-value" id="uploadedChunks">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">⏳ Queue</span>
          <span class="stat-value" id="queueSize">0</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">📺 Xem Trực Tiếp & Lưu Trữ</div>
      <button
        onclick="window.open('viewer.html', 'viewer', 'width=1200,height=800')"
      >
        👁️ Mở Trình Xem
      </button>
    </div>

    <script>
      const HUB_URL = "http://localhost:5000/hub/video-stream";

      let stream;
      let mediaRecorder;
      let timerInterval;
      let connection = null;
      let sessionId = null;
      let chunkIndex = 0;
      let chunkQueue = [];
      let isUploading = false;
      let uploadInterval = null;
      const BATCH_UPLOAD_INTERVAL = 500; // Upload batches every 500ms for faster, smaller uploads
      const MAX_CHUNKS_PER_BATCH = 2; // Reduce to 2 to keep messages well under 5MB limit with 500ms collection
      let connectionErrorCount = 0;
      const MAX_RECONNECTION_ATTEMPTS = 5;
      let totalBytesUploaded = 0;
      let totalChunksUploaded = 0;

      const takePhotoBtn = document.getElementById("takePhoto");
      const savePhotoBtn = document.getElementById("savePhoto");
      const photoCanvas = document.getElementById("photoCanvas");
      const photoPreview = document.getElementById("photoPreview");

      const preview = document.getElementById("preview");
      const startCameraBtn = document.getElementById("startCamera");
      const stopCameraBtn = document.getElementById("stopCamera");
      const startRecordingBtn = document.getElementById("startRecording");
      const stopRecordingBtn = document.getElementById("stopRecording");
      const startTimeDisplay = document.getElementById("startTimeDisplay");
      const recordingTimer = document.getElementById("recordingTimer");
      const statusMessage = document.getElementById("statusMessage");
      const streamTitleInput = document.getElementById("streamTitle");
      const uploadStats = document.getElementById("uploadStats");
      const uploadedBytesElem = document.getElementById("uploadedBytes");
      const uploadedChunksElem = document.getElementById("uploadedChunks");
      const queueSizeElem = document.getElementById("queueSize");

      // Initialize SignalR connection
      function initConnection() {
        console.log("[SignalR] Initializing connection to", HUB_URL);
        connection = new signalR.HubConnectionBuilder()
          .withUrl(HUB_URL)
          .withHubProtocol(new signalR.protocols.msgpack.MessagePackHubProtocol())
          .withAutomaticReconnect([0, 1000, 3000, 5000, 10000]) // More aggressive reconnection
          .build();

        connection.onreconnecting(() => {
          statusMessage.textContent = "⏳ Reconnecting to server...";
          console.log("[SignalR] Reconnecting to server");
        });

        connection.onreconnected(() => {
          statusMessage.textContent = "✅ Reconnected to server";
          console.log("[SignalR] Reconnected, state:", connection.state);
          connectionErrorCount = 0;
          if (
            mediaRecorder &&
            mediaRecorder.state === "recording" &&
            chunkQueue.length > 0
          ) {
            console.log("[SignalR] Resuming upload, queue:", chunkQueue.length);
            batchUploadChunks();
          }
        });

        connection.onclose((error) => {
          if (error) {
            statusMessage.textContent = `❌ Disconnected: ${error}`;
            console.error("[SignalR] Connection closed with error:", error);
          } else {
            statusMessage.textContent = "❌ Disconnected from server";
            console.log("[SignalR] Connection closed normally");
          }
        });

        connection
          .start()
          .then(() => {
            console.log(
              "[SignalR] Connected successfully, state:",
              connection.state,
            );
            statusMessage.textContent = "✅ Connected to server";
          })
          .catch((err) => {
            console.error("[SignalR] Connection failed:", err);
            statusMessage.textContent = "❌ Cannot connect to server: " + err;
            console.log("[SignalR] Retrying in 5 seconds...");
            setTimeout(() => initConnection(), 5000);
          });

        // Handle error messages from server
        connection.on("Error", (message) => {
          console.error("[SignalR] Server error:", message);
          statusMessage.textContent = `⚠️ Server: ${message}`;
        });
      }

      initConnection();

      // Debug: Show HubConnectionState values
      console.log("[Init] HubConnectionState values:", {
        Connected: signalR.HubConnectionState.Connected,
        Connecting: signalR.HubConnectionState.Connecting,
        Disconnected: signalR.HubConnectionState.Disconnected,
        Disconnecting: signalR.HubConnectionState.Disconnecting,
        Reconnecting: signalR.HubConnectionState.Reconnecting,
      });

      startCameraBtn.onclick = async () => {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true,
          });
          preview.srcObject = stream;
          startRecordingBtn.disabled = false;
          takePhotoBtn.disabled = false;
          startCameraBtn.disabled = true;
          stopCameraBtn.disabled = false;
          statusMessage.textContent = "✅ Camera started";
        } catch (err) {
          alert("❌ Cannot access webcam: " + err);
          statusMessage.textContent = "❌ Camera error: " + err;
        }
      };

      stopCameraBtn.onclick = () => {
        if (stream) {
          stream.getTracks().forEach((track) => track.stop());
        }
        preview.srcObject = null;
        startCameraBtn.disabled = false;
        stopCameraBtn.disabled = true;
        startRecordingBtn.disabled = true;
        takePhotoBtn.disabled = true;
        savePhotoBtn.disabled = true;

        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
          stopRecordingBtn.disabled = true;
        }
        startTimeDisplay.textContent = "";
        statusMessage.textContent = "⏹️ Camera stopped";
      };

      startRecordingBtn.onclick = async () => {
        try {
          console.log("[Recording] Connection check:", {
            exists: !!connection,
            state: connection?.state,
            connected:
              connection?.state === signalR.HubConnectionState.Connected,
            expectedState: signalR.HubConnectionState.Connected,
          });

          if (
            !connection ||
            connection.state !== signalR.HubConnectionState.Connected
          ) {
            const state = connection?.state ?? "no connection";
            statusMessage.textContent = `❌ Not connected to server (state=${state})`;
            console.error("[Recording] Connection not ready!");
            return;
          }

          const title = streamTitleInput.value || "Recording";
          statusMessage.textContent = "⏳ Starting stream...";

          console.log("[Recording] Invoking StartStream with title:", title);
          sessionId = await connection.invoke("StartStream", title);
          console.log(
            "[Recording] ✅ StartStream successful, sessionId:",
            sessionId,
          );
          chunkIndex = 0;
          chunkQueue = [];
          totalBytesUploaded = 0;
          totalChunksUploaded = 0;
          uploadStats.style.display = 'flex';
          updateUploadStats();

          statusMessage.textContent = `✅ Stream started (Session: ${sessionId.substring(0, 8)}...)`;

          mediaRecorder = new MediaRecorder(stream);

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
              chunkQueue.push(event.data);
            }
          };

          mediaRecorder.onstop = async () => {
            if (uploadInterval) {
              clearInterval(uploadInterval);
              uploadInterval = null;
            }

            if (chunkQueue.length > 0) {
              statusMessage.textContent = "⏳ Uploading final chunks...";
              await batchUploadChunks();
            }

            statusMessage.textContent = "⏳ Finalizing stream on server...";
            const timestamp = new Date()
              .toISOString()
              .replace(/[:.]/g, "-")
              .slice(0, -5);
            const filename = `${title}_${timestamp}`;

            try {
              const result = await connection.invoke(
                "FinalizeStream",
                sessionId,
                filename,
              );
              statusMessage.textContent = `✅ Stream ended and saved: ${result}.webm`;
              sessionId = null;
            } catch (err) {
              statusMessage.textContent = `❌ Error finalizing: ${err}`;
            }

            clearInterval(timerInterval);
            recordingTimer.textContent = "";
          };

          const now = new Date();
          const timeStr = now.toLocaleTimeString("vi-VN");
          startTimeDisplay.textContent = `⏱ Started at: ${timeStr}`;

          let seconds = 0;
          timerInterval = setInterval(() => {
            seconds++;
            const mins = String(Math.floor(seconds / 60)).padStart(2, "0");
            const secs = String(seconds % 60).padStart(2, "0");
            recordingTimer.textContent = `⏳ Recording: ${mins}:${secs}`;
          }, 1000);

          // Start batch upload interval
          uploadInterval = setInterval(() => {
            if (chunkQueue.length > 0 && !isUploading) {
              batchUploadChunks();
            }
          }, BATCH_UPLOAD_INTERVAL);

          mediaRecorder.start(500); // Collect data every 500ms for smaller chunks
          startRecordingBtn.disabled = true;
          stopRecordingBtn.disabled = false;
        } catch (err) {
          statusMessage.textContent = `❌ Error: ${err}`;
          alert("❌ Error starting recording: " + err);
        }
      };

      stopRecordingBtn.onclick = () => {
        mediaRecorder.stop();
        startRecordingBtn.disabled = false;
        stopRecordingBtn.disabled = true;
      };

      async function batchUploadChunks() {
        console.log(
          "[Upload] batchUploadChunks called: queue.length=",
          chunkQueue.length,
          "isUploading=",
          isUploading,
          "sessionId=",
          !!sessionId,
        );

        if (chunkQueue.length === 0 || isUploading || !sessionId) {
          console.log(
            "[Upload] Early return - queue empty or already uploading",
          );
          return;
        }

        const connectionState = connection ? connection.state : -1;
        const isConnected =
          connection &&
          connection.state === signalR.HubConnectionState.Connected;
        console.log(
          "[Upload] Connection state:",
          connectionState,
          "(Connected=",
          signalR.HubConnectionState.Connected,
          ") isConnected=",
          isConnected,
        );

        if (!isConnected) {
          console.warn("[Upload] Not connected to server");
          statusMessage.textContent =
            "⚠️ Not connected, buffering chunks... (state:" +
            connectionState +
            ")";
          return;
        }

        isUploading = true;
        try {
          const chunksToUpload = chunkQueue.splice(0, MAX_CHUNKS_PER_BATCH);
          console.log(
            "[Upload] Processing batch of",
            chunksToUpload.length,
            "chunks",
          );
          let successCount = 0;

          for (const blob of chunksToUpload) {
            try {
              const arrayBuffer = await blob.arrayBuffer();
              const uint8Array = new Uint8Array(arrayBuffer);

              console.log(
                `[Upload] Invoking UploadChunk: sessionId=${sessionId}, chunkIndex=${chunkIndex}, uint8ArrayLength=${uint8Array.length}`,
              );
              await connection.invoke(
                "UploadChunk",
                sessionId,
                chunkIndex,
                uint8Array,
              );
              console.log(`[Upload] ✅ Chunk ${chunkIndex} uploaded`);
              
              // Track uploaded bytes and chunks
              totalBytesUploaded += uint8Array.length;
              totalChunksUploaded++;
              updateUploadStats();
              
              chunkIndex++;
              successCount++;
              connectionErrorCount = 0;
            } catch (err) {
              console.error("[Upload] ❌ Chunk error:", err);
              connectionErrorCount++;

              if (connectionErrorCount > MAX_RECONNECTION_ATTEMPTS) {
                statusMessage.textContent = `❌ Upload failed too many times (${connectionErrorCount}). Stopped.`;
                return;
              }

              chunkQueue.unshift(blob);
              statusMessage.textContent = `⚠️ Retry ${connectionErrorCount}/${MAX_RECONNECTION_ATTEMPTS}`;
              break;
            }
          }

          if (
            successCount > 0 &&
            mediaRecorder &&
            mediaRecorder.state === "recording"
          ) {
            statusMessage.textContent = `📤 ${chunkIndex} chunks uploaded (queue: ${chunkQueue.length})`;
          }
        } catch (err) {
          console.error("[Upload] Batch error:", err);
          statusMessage.textContent = `❌ Upload error: ${err}`;
        } finally {
          isUploading = false;
        }
      }

      takePhotoBtn.onclick = () => {
        photoCanvas.width = preview.videoWidth;
        photoCanvas.height = preview.videoHeight;
        photoCanvas.getContext('2d').drawImage(preview, 0, 0);
        photoPreview.src = photoCanvas.toDataURL('image/png');
        photoPreview.style.display = 'block';
        savePhotoBtn.disabled = false;
      };

      savePhotoBtn.onclick = () => {
        photoCanvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
          a.href = url;
          a.download = `photo_${timestamp}.png`;
          a.click();
          URL.revokeObjectURL(url);
        }, 'image/png');
      };

      function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
      }

      function updateUploadStats() {
        uploadedBytesElem.textContent = formatBytes(totalBytesUploaded);
        uploadedChunksElem.textContent = totalChunksUploaded;
        const queueBytes = chunkQueue.reduce((sum, blob) => sum + blob.size, 0);
        queueSizeElem.textContent = `${chunkQueue.length} (${formatBytes(queueBytes)})`;
      }
    </script>
  </body>
</html>
