<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Webcam Video Recorder</title>
    <script type="importmap">
    {
      "imports": {
        "@azure/communication-calling": "https://esm.sh/@azure/communication-calling@1.24.3",
        "@azure/communication-common": "https://esm.sh/@azure/communication-common@2.3.1"
      }
    }
    </script>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
      }
      video {
        border: 2px solid #333;
        border-radius: 10px;
        width: 100%;
        max-width: 640px;
        height: auto;
        background: #000;
      }
      button {
        margin: 10px 5px;
        padding: 10px 20px;
        font-size: 16px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover { background: #0056b3; }
      button:disabled { background: #ccc; cursor: not-allowed; }
      p { margin: 5px 0; font-size: 14px; }
      .section {
        margin: 20px 0;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      .section-title { font-weight: bold; font-size: 16px; margin-bottom: 10px; }
      input {
        padding: 8px;
        margin: 5px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
        width: 300px;
        max-width: 100%;
      }
      .upload-stats {
        display: flex;
        gap: 20px;
        margin-top: 10px;
        padding: 10px;
        background: #f0f0f0;
        border-radius: 4px;
      }
      .stat { display: flex; flex-direction: column; gap: 4px; }
      .stat-label { font-size: 12px; color: #666; font-weight: bold; }
      .stat-value { font-size: 14px; color: #333; font-weight: bold; }
    </style>
  </head>
  <body>
    <h1>🎥 Webcam Video Recorder</h1>

    <div class="section">
      <div class="section-title">📹 Camera</div>
      <div id="previewContainer">
        <video id="preview" autoplay muted></video>
      </div>
      <br />
      <button id="startCamera">▶️ Start Camera</button>
      <button id="stopCamera" disabled>⏹️ Stop Camera</button>
    </div>

    <div class="section">
      <div class="section-title">🎬 Record Video</div>
      <label>Stream Title:</label><br />
      <input id="streamTitle" type="text" placeholder="Enter stream title" value="My Recording" />
      <br />
      <button id="startRecording" disabled>⏸️ Start Recording</button>
      <button id="stopRecording" disabled>⏹️ Stop Recording</button>

      <p id="startTimeDisplay" style="font-size: 18px; font-weight: bold"></p>
      <p id="recordingTimer" style="font-size: 18px; color: red"></p>
      <p id="statusMessage" style="font-size: 14px; color: blue"></p>

      <div class="upload-stats" id="uploadStats" style="display: none;">
        <div class="stat">
          <span class="stat-label">📤 Uploaded</span>
          <span class="stat-value" id="uploadedBytes">0 B</span>
        </div>
        <div class="stat">
          <span class="stat-label">📦 Chunks</span>
          <span class="stat-value" id="uploadedChunks">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">⏳ Queue</span>
          <span class="stat-value" id="queueSize">0</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">📺 Live View &amp; Storage</div>
      <button onclick="window.open('viewer.html', 'viewer', 'width=1200,height=800')">
        👁️ Open Viewer
      </button>
    </div>

    <script type="module">
      import { CallClient, LocalVideoStream, VideoStreamRenderer } from "@azure/communication-calling";
      import { AzureCommunicationTokenCredential } from "@azure/communication-common";

      const API_BASE = "http://localhost:5000/api";
      const BATCH_UPLOAD_INTERVAL = 500;

      let mediaStream = null;
      let mediaRecorder = null;
      let timerInterval = null;
      let uploadInterval = null;
      let callAgent = null;
      let currentCall = null;
      let localVideoRenderer = null;
      let roomId = null;
      let videoSessionId = null;
      let chunkIndex = 0;
      let chunkQueue = [];
      let isUploading = false;
      let totalBytesUploaded = 0;
      let totalChunksUploaded = 0;

      const preview = document.getElementById("preview");
      const startCameraBtn = document.getElementById("startCamera");
      const stopCameraBtn = document.getElementById("stopCamera");
      const startRecordingBtn = document.getElementById("startRecording");
      const stopRecordingBtn = document.getElementById("stopRecording");
      const startTimeDisplay = document.getElementById("startTimeDisplay");
      const recordingTimer = document.getElementById("recordingTimer");
      const statusMessage = document.getElementById("statusMessage");
      const streamTitleInput = document.getElementById("streamTitle");
      const uploadStats = document.getElementById("uploadStats");
      const uploadedBytesElem = document.getElementById("uploadedBytes");
      const uploadedChunksElem = document.getElementById("uploadedChunks");
      const queueSizeElem = document.getElementById("queueSize");

      function formatBytes(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / 1048576).toFixed(1) + " MB";
      }

      function updateUploadStats() {
        uploadedBytesElem.textContent = formatBytes(totalBytesUploaded);
        uploadedChunksElem.textContent = totalChunksUploaded;
        queueSizeElem.textContent = chunkQueue.length;
      }

      startCameraBtn.onclick = async () => {
        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
          preview.srcObject = mediaStream;
          startRecordingBtn.disabled = false;
          startCameraBtn.disabled = true;
          stopCameraBtn.disabled = false;
          statusMessage.textContent = "✅ Camera started";
        } catch (err) {
          alert("❌ Cannot access webcam: " + err);
          statusMessage.textContent = "❌ Camera error: " + err;
        }
      };

      stopCameraBtn.onclick = () => {
        if (mediaStream) {
          mediaStream.getTracks().forEach(t => t.stop());
          mediaStream = null;
        }
        preview.srcObject = null;
        startCameraBtn.disabled = false;
        stopCameraBtn.disabled = true;
        startRecordingBtn.disabled = true;
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
          stopRecordingBtn.disabled = true;
        }
        startTimeDisplay.textContent = "";
        statusMessage.textContent = "⏹️ Camera stopped";
      };

      startRecordingBtn.onclick = async () => {
        try {
          const title = streamTitleInput.value.trim() || "Recording";
          statusMessage.textContent = "⏳ Getting ACS token...";

          // 1. Get ACS token
          const tokenRes = await fetch(`${API_BASE}/acs/token`, { method: "POST" });
          if (!tokenRes.ok) throw new Error("Failed to get ACS token");
          const { userId, token } = await tokenRes.json();

          // 2. Create ACS room (also creates video session)
          statusMessage.textContent = "⏳ Creating room...";
          const roomRes = await fetch(`${API_BASE}/acs/rooms`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, userId })
          });
          if (!roomRes.ok) throw new Error("Failed to create room");
          const roomData = await roomRes.json();
          roomId = roomData.roomId;
          videoSessionId = roomData.videoSessionId;

          // 3. Join ACS call
          statusMessage.textContent = "⏳ Joining ACS call...";
          const credential = new AzureCommunicationTokenCredential(token);
          const callClient = new CallClient();
          callAgent = await callClient.createCallAgent(credential, { displayName: "Recorder" });

          const localVideoStream = new LocalVideoStream(mediaStream);
          currentCall = callAgent.join(
            { roomId },
            { videoOptions: { localVideoStreams: [localVideoStream] } }
          );

          // Render local preview via ACS renderer
          localVideoRenderer = new VideoStreamRenderer(localVideoStream);
          const view = await localVideoRenderer.createView({ scalingMode: "Crop" });
          preview.srcObject = null;
          preview.parentElement.appendChild(view.target);

          // 4. Start local MediaRecorder for archiving
          chunkIndex = 0;
          chunkQueue = [];
          totalBytesUploaded = 0;
          totalChunksUploaded = 0;
          uploadStats.style.display = "flex";
          updateUploadStats();

          mediaRecorder = new MediaRecorder(mediaStream);
          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) chunkQueue.push(e.data);
          };
          mediaRecorder.onstop = async () => {
            if (uploadInterval) { clearInterval(uploadInterval); uploadInterval = null; }
            if (chunkQueue.length > 0) {
              statusMessage.textContent = "⏳ Uploading final chunks...";
              await batchUploadChunks();
            }
            // Finalize video
            const ts = new Date().toISOString().replace(/[:.]/g, "-").slice(0, -5);
            const filename = `${title}_${ts}`;
            try {
              const finalRes = await fetch(
                `${API_BASE}/video/finalize?sessionId=${encodeURIComponent(videoSessionId)}&filename=${encodeURIComponent(filename)}`,
                { method: "POST" }
              );
              if (finalRes.ok) {
                statusMessage.textContent = `✅ Saved: ${filename}.webm`;
              } else {
                statusMessage.textContent = "⚠️ Finalize returned error";
              }
            } catch (err) {
              statusMessage.textContent = "❌ Finalize failed: " + err;
            }
            // End ACS room
            try {
              if (currentCall) { await currentCall.hangUp(); currentCall = null; }
              if (callAgent) { callAgent.dispose(); callAgent = null; }
              await fetch(`${API_BASE}/acs/rooms/${encodeURIComponent(roomId)}`, { method: "DELETE" });
            } catch (err) {
              console.error("Cleanup error:", err);
            }
            roomId = null;
            videoSessionId = null;
            clearInterval(timerInterval);
            recordingTimer.textContent = "";
          };

          uploadInterval = setInterval(() => {
            if (chunkQueue.length > 0 && !isUploading) batchUploadChunks();
          }, BATCH_UPLOAD_INTERVAL);

          mediaRecorder.start(500);

          // Timer
          const now = new Date();
          startTimeDisplay.textContent = `⏱ Started at: ${now.toLocaleTimeString("en-US")}`;
          let seconds = 0;
          timerInterval = setInterval(() => {
            seconds++;
            const m = String(Math.floor(seconds / 60)).padStart(2, "0");
            const s = String(seconds % 60).padStart(2, "0");
            recordingTimer.textContent = `⏳ Recording: ${m}:${s}`;
          }, 1000);

          startRecordingBtn.disabled = true;
          stopRecordingBtn.disabled = false;
          statusMessage.textContent = `✅ Recording (Room: ${roomId.substring(0, 8)}...)`;
        } catch (err) {
          statusMessage.textContent = "❌ Error: " + err;
          console.error(err);
        }
      };

      stopRecordingBtn.onclick = () => {
        if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
        startRecordingBtn.disabled = false;
        stopRecordingBtn.disabled = true;
        if (localVideoRenderer) { localVideoRenderer.dispose(); localVideoRenderer = null; }
        // Restore raw preview
        if (mediaStream) preview.srcObject = mediaStream;
      };

      async function batchUploadChunks() {
        if (isUploading || chunkQueue.length === 0 || !videoSessionId) return;
        isUploading = true;
        try {
          while (chunkQueue.length > 0) {
            const blob = chunkQueue.shift();
            const arrayBuffer = await blob.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const res = await fetch(
              `${API_BASE}/video/chunk?sessionId=${encodeURIComponent(videoSessionId)}&chunkIndex=${chunkIndex}`,
              { method: "POST", headers: { "Content-Type": "application/octet-stream" }, body: data }
            );
            if (res.ok) {
              totalBytesUploaded += data.length;
              totalChunksUploaded++;
              chunkIndex++;
            }
            updateUploadStats();
          }
        } catch (err) {
          console.error("Upload error:", err);
        } finally {
          isUploading = false;
        }
      }
    </script>
  </body>
</html>
